kind = "web"
previewPath = "/"
title = "eBay Deal Scanner"
version = "1.0.0"
id = "artifacts/deal-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23109

[services.development]
run = "pnpm --filter @workspace/deal-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deal-scanner", "run", "build" ]
publicDir = "artifacts/deal-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23109"
BASE_PATH = "/"
